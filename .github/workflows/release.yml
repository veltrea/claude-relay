name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-relay-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claude-relay-macos-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: claude-relay-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: claude-relay-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: claude-relay-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/claude-relay ${{ matrix.artifact }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/claude-relay.exe ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
